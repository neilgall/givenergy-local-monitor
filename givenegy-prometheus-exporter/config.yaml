# GiveNergy Prometheus Exporter Configuration

# Inverter connection settings
inverter:
  host: "10.180.1.188"   # IP address of the GivEnergy inverter
  port: 8899             # Modbus TCP port (standard GiveNergy port)
  unit_id: 0x11          # Kept for reference; givenergy-modbus handles device addressing internally
  timeout: 10            # Connection timeout in seconds
  poll_interval: 30      # Poll interval in seconds

# Prometheus exporter settings
prometheus:
  port: 9100             # Port to expose metrics on
  address: "0.0.0.0"     # Address to bind to
