version: '3.8'

services:
  givenergy-exporter:
    build: .
    container_name: givenergy-exporter
    ports:
      - "9100:9100"
    restart: unless-stopped
    environment:
      - INVERTER_HOST=10.180.1.188
      - INVERTER_PORT=8899
      - POLL_INTERVAL=30
      - PROMETHEUS_ADDRESS=0.0.0.0
      - PROMETHEUS_PORT=9100
      - TZ=UTC
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Prometheus service for testing
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

volumes:
  prometheus-data:
